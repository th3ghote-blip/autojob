name: find-emails
# Free recruiter-email scraper. Walks each company's website looking for
# careers@ / jobs@ / talent@ / etc. Backfills companies.contact_email and
# propagates to jobs.contact_email for jobs that don't have their own.

on:
  schedule:
    # Twice a week — Tuesdays and Fridays at 06:30 UTC.
    - cron: '30 6 * * 2,5'
  workflow_dispatch:
    inputs:
      max:
        description: 'Max companies to scan this run'
        required: false
        default: '200'
      recheck:
        description: 'Re-check companies even if already scanned (true/false)'
        required: false
        default: 'false'

jobs:
  find-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # GITHUB_TOKEN is auto-provisioned by Actions for API calls — gives 5000 req/h
      # for the github-commit email finder. No extra secret needed.
      MAX_INPUT: ${{ github.event.inputs.max }}
      RECHECK_INPUT: ${{ github.event.inputs.recheck }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Backfill emails
        shell: bash
        run: |
          MAX="${MAX_INPUT:-200}"
          if [ "$RECHECK_INPUT" = "true" ]; then
            python -m workers.find_emails --max "$MAX" --recheck
          else
            python -m workers.find_emails --max "$MAX"
          fi
