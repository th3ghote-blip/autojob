name: send
# Sends one outreach (workflow_dispatch with outreach_id) or, in batch mode,
# every ready_to_send outreach up to max. Cron is disabled by default — sending
# is user-initiated via the /jobs/[id] Send button.

on:
  workflow_dispatch:
    inputs:
      outreach_id:
        description: 'Single-send mode: outreach UUID to send'
        required: false
        default: ''
      max:
        description: 'Batch mode: max sends this run'
        required: false
        default: '20'

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      OUTREACH_INPUT: ${{ github.event.inputs.outreach_id }}
      MAX_INPUT: ${{ github.event.inputs.max }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Send
        shell: bash
        run: |
          if [ -n "$OUTREACH_INPUT" ]; then
            python -m workers.send --outreach "$OUTREACH_INPUT"
          else
            MAX="${MAX_INPUT:-20}"
            python -m workers.send --max "$MAX"
          fi
