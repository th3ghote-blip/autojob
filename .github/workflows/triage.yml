name: triage
# One-shot title triage:
#   1. Archive obvious-reject titles (no LLM tokens)
#   2. LLM-score the tier-1-looking titles immediately
# Run with workflow_dispatch when you want a big batch ranked fast.

on:
  workflow_dispatch:
    inputs:
      max_llm:
        description: 'Max tier-1-titled jobs to LLM-score this run'
        required: false
        default: '400'
      dry_run:
        description: 'true = just show counts, no writes'
        required: false
        default: 'false'

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MAX_LLM: ${{ github.event.inputs.max_llm }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Triage
        shell: bash
        run: |
          MAX="${MAX_LLM:-400}"
          if [ "$DRY_RUN" = "true" ]; then
            python -m workers.triage --dry-run
          else
            python -m workers.triage --max-llm "$MAX"
          fi
