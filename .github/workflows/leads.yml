name: leads
# Vicidial customer-prospect lead finder.
# Scrapes DDG search / vicidial.org forum / Reddit r/VICIDial weekly,
# then Haiku-classifies each new lead.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'full | scrape-only | classify-only'
        required: false
        default: 'full'
      max_classify:
        description: 'cap on Haiku calls (~$0.001 each)'
        required: false
        default: '300'
      dry_run:
        description: 'true = print only, no writes'
        required: false
        default: 'false'
  schedule:
    - cron: '0 8 * * 1'   # Mondays 08:00 UTC

jobs:
  leads:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MODE: ${{ github.event.inputs.mode }}
      MAX_CLASSIFY: ${{ github.event.inputs.max_classify }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Run lead pipeline
        shell: bash
        run: |
          MODE="${MODE:-full}"
          MAX="${MAX_CLASSIFY:-300}"
          ARGS="--max-classify $MAX"
          [ "$DRY_RUN" = "true" ] && ARGS="$ARGS --dry-run"
          case "$MODE" in
            scrape-only)   python -m workers.leads.runner --scrape-only   $ARGS ;;
            classify-only) python -m workers.leads.runner --classify-only $ARGS ;;
            *)             python -m workers.leads.runner                 $ARGS ;;
          esac
