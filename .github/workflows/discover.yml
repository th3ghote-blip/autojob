name: discover
# Daily 07:00 UTC scrape of every enabled source.
# Writes companies + jobs + job_raw rows to Supabase.
# Workflow logs surface in /sources via worker_runs.github_run_url.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Slug of a single source to run (optional)'
        required: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Run runner
        run: |
          if [ -n "${{ inputs.source }}" ]; then
            python -m workers.runner --source "${{ inputs.source }}"
          else
            python -m workers.runner
          fi
