name: pipeline
# Runs an hour after discover. Researches new companies, scores fit,
# drafts letters for qualified jobs.

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      max:
        description: 'Cap how many jobs to advance this run'
        required: false
        default: '20'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      MAX_INPUT: ${{ github.event.inputs.max }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Research + draft
        shell: bash
        run: |
          MAX="${MAX_INPUT:-20}"
          python -m workers.pipeline --max "$MAX"
