name: pipeline
# Runs an hour after discover. Researches new companies, scores fit,
# drafts letters for qualified jobs.

# Cron disabled: the qualifier is now manual / on-demand only. The user picks
# which jobs deserve a letter via the /jobs page; this workflow runs in
# single-job mode (workflow_dispatch with job_id) or batch (with max).
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: 'Run on one specific job UUID (skips qualifier gate, drafts letter directly)'
        required: false
        default: ''
      max:
        description: 'Batch mode: cap how many jobs to advance this run'
        required: false
        default: '20'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      MAX_INPUT: ${{ github.event.inputs.max }}
      JOB_INPUT: ${{ github.event.inputs.job_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: workers/requirements.txt
      - run: pip install -r workers/requirements.txt
      - name: Research + draft
        shell: bash
        run: |
          if [ -n "$JOB_INPUT" ]; then
            python -m workers.pipeline --job "$JOB_INPUT"
          else
            MAX="${MAX_INPUT:-20}"
            python -m workers.pipeline --max "$MAX"
          fi
